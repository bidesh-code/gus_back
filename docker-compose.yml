services:
  # --------------------------------------------------------
  # PostgreSQL Database Service
  # --------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: gusion-db
    ports:
      - "5432:5432"  # Maps local port 5432 to container port 5432
    environment:
      POSTGRES_USER: gusion           # Matches application.yaml username
      POSTGRES_PASSWORD: gusion_secret # Matches application.yaml password
      POSTGRES_DB: gusion             # Matches application.yaml database name
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: