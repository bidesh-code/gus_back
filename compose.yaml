# Gusion Online Judge - Database
# Use docker-compose up -d to start, or rely on Spring Boot docker-compose support
services:
  postgres:
    image: postgres:16-alpine
    container_name: gusion-postgres
    environment:
      POSTGRES_DB: gusion
      POSTGRES_USER: gusion
      POSTGRES_PASSWORD: gusion_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gusion -d gusion"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
